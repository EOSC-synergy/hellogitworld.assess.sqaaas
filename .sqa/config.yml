config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint_fix
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/PalomoIFCA/hellogitworld:
      branch: main
      repo: https://github.com/PalomoIFCA/hellogitworld
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/PalomoIFCA/hellogitworld git:
        commands:
        - /usr/bin/env sh .sqa/script.skinny-white-buffalo.sh
        container: qc.acc_breezy-platinum-starfish
  QC.Doc:
    repos:
      github.com/PalomoIFCA/hellogitworld find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.sloppy-olivine-saola.sh
        container: qc.doc_randy-wisteria-angora
      github.com/PalomoIFCA/hellogitworld git:
        commands:
        - /usr/bin/env sh .sqa/script.zippy-tan-gopher.sh
        container: qc.doc_lumpy-charcoal-mau
  QC.Lic:
    repos:
      github.com/PalomoIFCA/hellogitworld licensee:
        commands:
        - /usr/bin/env sh .sqa/script.bluesy-teal-woodlouse.sh
        container: qc.lic_squeaky-violet-meerkat
  QC.Sty:
    repos:
      github.com/PalomoIFCA/hellogitworld checkstyle:
        commands:
        - /usr/bin/env sh .sqa/script.shaky-red-bulldog.sh
        container: qc.sty_seedy-orchid-terrier
  QC.Ver:
    repos:
      github.com/PalomoIFCA/hellogitworld get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.trippy-goldenrod-cheetah.sh
        container: qc.ver_seedy-emerald-kangaroo
timeout: 5400
